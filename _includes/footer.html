<footer class="site-footer">
  <div class="container footer-inner">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name }}</p>
    <ul class="footer-links">
      {% if site.author.github %}
        <li><a href="https://github.com/{{ site.author.github }}" target="_blank">GitHub</a></li>
      {% endif %}
      {% if site.author.linkedin %}
        <li><a href="https://linkedin.com/in/{{ site.author.linkedin }}" target="_blank">LinkedIn</a></li>
      {% endif %}
      {% if site.author.twitter %}
        <li><a href="https://twitter.com/{{ site.author.twitter }}" target="_blank">Twitter</a></li>
      {% endif %}
    </ul>
  </div>
</footer>
