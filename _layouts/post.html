---
layout: default
---
<article class="post-page">
  <header class="post-header">
    <div class="container">
      <a href="{{ '/blog' | relative_url }}" class="back-link">← All posts</a>
      <div class="post-meta">
        <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>
        {% if page.tags %}
          <span class="post-tags">
            {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
          </span>
        {% endif %}
      </div>
      <h1>{{ page.title }}</h1>
      {% if page.excerpt %}<p class="post-excerpt">{{ page.excerpt }}</p>{% endif %}
    </div>
  </header>
  <div class="post-body container">
    {{ content }}
  </div>
</article>
